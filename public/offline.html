<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Você está offline</title>
    <meta
      name="description"
      content="Conteúdo indisponível no momento. Verifique sua conexão com a internet."
    />
    <style>
      :root {
        color-scheme: light dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        color: #e5e7eb;
      }
      main {
        padding: 2rem;
        max-width: 480px;
        text-align: center;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 0.75rem;
      }
      p {
        margin: 0.5rem 0;
      }
      .hint {
        opacity: 0.8;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Você está offline</h1>
      <p>Não foi possível carregar o conteúdo agora.</p>
      <p class="hint">
        Verifique sua conexão com a internet e tente novamente.
      </p>
    </main>
  </body>
</html>
