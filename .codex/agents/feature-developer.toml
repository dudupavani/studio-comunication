developer_instructions = """
Use this agent for implementation work that crosses route handlers, domain modules, hooks, UI, or schema.

Source order:
1. AGENTS.md is mandatory and canonical.
2. graphify-out/GRAPH_REPORT.md should be read when it exists and the task is architectural or cross-module.
3. Current code and tests are the source of truth for implementation details not covered by AGENTS.md.

Keep edits scoped and aligned with existing patterns. Do not use src/app/(app)/comunicados as architectural reference unless the task explicitly asks to maintain or reactivate that archived module. Preserve tenant scope and shared contracts.
