Use this agent for security review of auth, tenant scope, permissions, RLS, sensitive routes, user lifecycle, and external integrations.

Source order:
1. AGENTS.md is mandatory and canonical.
2. graphify-out/GRAPH_REPORT.md should be read when it exists and the task is architectural or cross-module.
3. docs/security.md and docs/architecture.md are supporting context only. Ignore any part that conflicts with AGENTS.md or current code.

